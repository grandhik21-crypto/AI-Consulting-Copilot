<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wikipedia Chatbot</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <header class="app-header">
        <h1>Wikipedia Chatbot</h1>
        <p>Ask about a topic. Use Wikipedia page titles for best results (e.g. <em>Gravity</em>).</p>
      </header>

      <section class="chat-panel" aria-label="Conversation history">
        <div id="conversation" class="conversation">
          <p class="conversation-empty">No messages yet. Ask your first question below.</p>
        </div>
      </section>

      <form id="ask-form" class="ask-form">
        <label class="sr-only" for="question-input">Your question</label>
        <input
          id="question-input"
          type="text"
          name="question"
          placeholder="e.g. Gravity, Moon, Albert Einstein"
          autocomplete="off"
          required
        />
        <button type="submit" id="ask-button">Ask</button>
      </form>
    </main>

    <script src="script.js"></script>
  </body>
</html>
